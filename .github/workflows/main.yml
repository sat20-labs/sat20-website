name: Deploy Static Website
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          
      - name: Add known hosts
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_IP" >> ~/.ssh/known_hosts
          
      - name: Create remote directory and deploy
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_IP" 'mkdir -p /var/www/sat20.org'
          rsync -avz --delete -e "ssh -p $SERVER_PORT" ./dist/ "$SERVER_USER@$SERVER_IP:/var/www/sat20.org/" --exclude .git --exclude .github
